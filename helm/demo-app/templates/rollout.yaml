apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "demo-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      {{- include "demo-app.selectorLabels" . | nindent 6 }}

  strategy:
    blueGreen:
      # Service recevant le trafic de production (actif)
      activeService: {{ include "demo-app.fullname" . }}-active
      # Service pointant vers la nouvelle version (preview)
      previewService: {{ include "demo-app.fullname" . }}-preview

      # Nombre de réplicas pour le pod preview avant promotion
      previewReplicaCount: {{ .Values.rollout.previewReplicaCount }}

      # Promotion automatique ou manuelle
      autoPromotionEnabled: {{ .Values.rollout.autoPromotionEnabled }}

      # Délai avant scale-down de l'ancienne version après promotion
      scaleDownDelaySeconds: {{ .Values.rollout.scaleDownDelaySeconds }}

      {{- if .Values.analysis.enabled }}
      # Analyse pre-promotion : Prometheus doit valider la version preview
      # avant que le trafic production lui soit envoyé
      prePromotionAnalysis:
        templates:
          - templateName: {{ include "demo-app.fullname" . }}-success-rate
        args:
          - name: service-name
            value: {{ include "demo-app.fullname" . }}-preview
          - name: namespace
            value: {{ .Release.Namespace }}
      {{- end }}

  template:
    metadata:
      labels:
        {{- include "demo-app.selectorLabels" . | nindent 8 }}
        app.version: {{ .Values.app.version | quote }}
        app.color: {{ .Values.app.colorName | quote }}
      annotations:
        # Déclenche un rolling update si le ConfigMap change
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum | trunc 8 | quote }}

    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

      volumes:
        - name: html
          configMap:
            name: {{ include "demo-app.fullname" . }}-html
