---
# Inventory de base — Ansible s'exécute localement.
# Les nœuds k3s (master + workers) sont ajoutés dynamiquement par
# k3s-install.yml et teardown.yml via add_host (depuis vm-outputs.json).

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"
