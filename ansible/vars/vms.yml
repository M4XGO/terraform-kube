# ansible/vars/vms.yml — Configuration VM Proxmox (nœud unique)
# Renseigner avant le premier déploiement.
#
# proxmox_vm_ip : IP de la VM déjà provisionnée dans Proxmox
# ssh_user      : utilisateur SSH (ex: debian, ubuntu, root)
# ssh_private_key: chemin vers la clé privée SSH locale
# cluster_prefix : nom du contexte kubectl créé par k3s-install

proxmox_vm_ip: "10.230.105.254"
ssh_user: "root"
ssh_private_key: "~/.ssh/id_ed25519"
cluster_prefix: "terraform-kube"
