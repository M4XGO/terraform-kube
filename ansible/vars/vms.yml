# ─── ansible/vars/vms.yml ────────────────────────────────────────────────────
# Configuration des VMs VMware Fusion pour le cluster k3s.
# Utilisé par : create-vms.yml, teardown.yml
# ─────────────────────────────────────────────────────────────────────────────
# ─── VMware Fusion REST API ───────────────────────────────────────────────────
# Activer : VMware Fusion Pro → Préférences → Enable REST API
vmrest_url: http://127.0.0.1:8697
vmrest_validate_certs: false
# ⚠️  À renseigner (ne pas committer ces valeurs)
vmrest_user: Maxgo
vmrest_password: Pa$$w0rd
# ─── Template VM ─────────────────────────────────────────────────────────────
# ID de la VM Debian ARM à cloner.
# Récupérer via : make vm-list
template_vm_id: 94EM6D9K533L10LBHP32CCTIU1SF3337
# Dossier où stocker les VMs clonées
vm_base_dir: /Users/maximenony/Downloads
# ─── SSH ─────────────────────────────────────────────────────────────────────
ssh_user: debian
ssh_private_key: ~/.ssh/id_ed25519
# ─── Cluster ─────────────────────────────────────────────────────────────────
cluster_prefix: automatisation-ansible-cluster
# ─── Specs master ────────────────────────────────────────────────────────────
master_cpu: 2
# Mo
master_memory: 4096
# ─── Specs workers ───────────────────────────────────────────────────────────
worker_count: 2
worker_cpu: 2
# Mo
worker_memory: 2048
