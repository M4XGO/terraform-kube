---
# ─── ansible/playbooks/create-vms.yml ────────────────────────────────────────
# Proxmox — nœud unique pré-existant.
# Ce playbook ne crée pas de VM : il génère uniquement vm-outputs.json
# depuis la config statique dans ansible/vars/vms.yml.
#
# Produit :
#   - vm-outputs.json → IP + infos SSH (utilisé par k3s-install.yml)
#
# Prérequis : renseigner proxmox_vm_ip dans ansible/vars/vms.yml
# ─────────────────────────────────────────────────────────────────────────────
- name: Générer vm-outputs.json depuis la config Proxmox
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../vars/vms.yml

  tasks:

    - name: Vérifier que proxmox_vm_ip est renseigné
      ansible.builtin.fail:
        msg: |
          proxmox_vm_ip est vide dans ansible/vars/vms.yml.
          Renseigner l'IP de la VM Proxmox avant de continuer.
      when: proxmox_vm_ip | length == 0

    - name: Vérifier que ssh_user est renseigné
      ansible.builtin.fail:
        msg: "ssh_user est vide dans ansible/vars/vms.yml."
      when: ssh_user | length == 0

    - name: Générer vm-outputs.json
      ansible.builtin.copy:
        content: |
          {
            "master_ip":       { "value": "{{ proxmox_vm_ip }}" },
            "worker_ips":      { "value": [] },
            "ssh_user":        { "value": "{{ ssh_user }}" },
            "ssh_private_key": { "value": "{{ ssh_private_key }}" },
            "cluster_prefix":  { "value": "{{ cluster_prefix }}" }
          }
        dest: "{{ playbook_dir }}/../../vm-outputs.json"
        mode: "0600"

    - name: Résumé
      ansible.builtin.debug:
        msg:
          - "✓ VM Proxmox    : {{ proxmox_vm_ip }}"
          - "✓ Utilisateur   : {{ ssh_user }}"
          - "✓ Clé SSH       : {{ ssh_private_key }}"
          - "→ vm-outputs.json généré"
