---
# ─── Pre-deploy : préparation de l'environnement ──────────────────────────────
# Vérifie que vmrest (VMware Fusion REST API) est accessible, installe les
# outils nécessaires (kubectl, helm) et initialise le cache Helm isolé pour
# Terraform.
#
# Les VMs sont créées par : terraform -chdir=terraform/vms apply
# k3s est installé par    : ansible/playbooks/k3s-install.yml
#
# Usage : ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/pre-deploy.yml
# ──────────────────────────────────────────────────────────────────────────────

- name: Pre-deploy — préparation environnement
  hosts: localhost
  gather_facts: true

  vars:
    vmrest_url: "http://127.0.0.1:8697/api"
    helm_cache_dir: "{{ playbook_dir }}/../../terraform/k8s/.terraform-helm"
    helm_repos:
      - { name: ingress-nginx,        url: "https://kubernetes.github.io/ingress-nginx" }
      - { name: jetstack,             url: "https://charts.jetstack.io" }
      - { name: prometheus-community, url: "https://prometheus-community.github.io/helm-charts" }
      - { name: argo,                 url: "https://argoproj.github.io/argo-helm" }
      - { name: cilium,               url: "https://helm.cilium.io/" }

  tasks:
    # ── Vérification vmrest ────────────────────────────────────────────────────

    - name: Vérifier que vmrest est accessible
      ansible.builtin.uri:
        url: "{{ vmrest_url }}/vms"
        method: GET
        validate_certs: false
        status_code: [200, 401]
      register: vmrest_check
      failed_when: false

    - name: Avertissement si vmrest inaccessible
      ansible.builtin.fail:
        msg: |
          vmrest n'est pas accessible sur {{ vmrest_url }}.
          Activez l'API REST dans VMware Fusion Pro → Préférences → Enable REST API
          puis relancez : make deploy
      when: vmrest_check.status not in [200, 401]

    - name: "vmrest ✓"
      ansible.builtin.debug:
        msg: "vmrest accessible sur {{ vmrest_url }}"

    # ── Installation des outils ────────────────────────────────────────────────

    - name: "[macOS] Installer kubectl et helm"
      community.general.homebrew:
        name: "{{ item }}"
        state: present
      loop:
        - kubectl
        - helm
      when: ansible_system == "Darwin"

    - name: "[Linux] Installer kubectl et helm"
      when: ansible_system == "Linux" and ansible_os_family == "Debian"
      block:
        - name: Ajouter la clé GPG Kubernetes
          ansible.builtin.shell: |
            curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key \
              | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          args:
            creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          become: true

        - name: Ajouter le dépôt Kubernetes
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /"
            state: present
          become: true

        - name: Installer kubectl
          ansible.builtin.apt:
            name: kubectl
            state: present
            update_cache: true
          become: true

        - name: Installer helm via script officiel
          ansible.builtin.shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          args:
            creates: /usr/local/bin/helm
          become: true

    # ── Vérification des outils ────────────────────────────────────────────────

    - name: Vérifier kubectl + helm
      ansible.builtin.command: "{{ item }}"
      loop:
        - kubectl version --client
        - helm version --short
      changed_when: false
      register: tool_check
      failed_when: tool_check.rc != 0

    # ── Cache Helm isolé pour terraform/k8s ───────────────────────────────────

    - name: Créer les répertoires du cache Helm isolé
      ansible.builtin.file:
        path: "{{ helm_cache_dir }}/cache"
        state: directory
        mode: "0755"

    - name: Ajouter les dépôts Helm dans le cache isolé
      ansible.builtin.command: >
        helm repo add {{ item.name }} {{ item.url }}
        --repository-config {{ helm_cache_dir }}/repositories.yaml
        --repository-cache  {{ helm_cache_dir }}/cache
      loop: "{{ helm_repos }}"
      register: helm_repo_add
      changed_when: "'has been added' in helm_repo_add.stdout"
      failed_when: >
        helm_repo_add.rc != 0 and
        'already exists' not in helm_repo_add.stderr

    - name: Mettre à jour le cache Helm isolé
      ansible.builtin.command: >
        helm repo update
        --repository-config {{ helm_cache_dir }}/repositories.yaml
        --repository-cache  {{ helm_cache_dir }}/cache
      changed_when: true

    - name: Prêt
      ansible.builtin.debug:
        msg:
          - "✓ vmrest accessible"
          - "✓ kubectl et helm disponibles"
          - "✓ Cache Helm Terraform initialisé (terraform/k8s/.terraform-helm/)"
          - ""
          - "Prochaine étape : terraform/vms apply (géré automatiquement par make deploy)"
